services:
  postgres:
    image: postgres:17.6-alpine3.22
    labels:
      io.quarkus.devservices.compose.wait_for.logs: .*database system is ready to
        accept connections.*
    restart: always
    ports:
    - '5432'
    environment:
    - POSTGRES_DB=quarkus
    - POSTGRES_PASSWORD=quarkus
    - POSTGRES_USER=quarkus
    command:
    - postgres
    - -c
    - wal_level=logical
    - -c
    - hot_standby=on
    - -c
    - max_wal_senders=10
    - -c
    - max_replication_slots=10
    - -c
    - synchronized_standby_slots=replication_slot
    healthcheck:
      test: [
        CMD,
        pg_isready
      ]
      timeout: 5s
      start_period: 10s
      interval: 10s
      retries: 5
    volumes:
    - ./salle_prisedecommande_target_consumer.sql:/docker-entrypoint-initdb.d/salle_prisedecommande_target_consumer.sql:ro,z
    - ./cuisine_production_target_consumer.sql:/docker-entrypoint-initdb.d/cuisine_production_target_consumer.sql:ro,z
    - ./gestion_statistics_idempotency_consumer.sql:/docker-entrypoint-initdb.d/gestion_statistics_idempotency_consumer.sql:ro,z
  kafka:
    image: debezium-for-dev-service/kafka:4.2.0
    labels:
      io.quarkus.devservices.compose.exposed_ports: /tmp/ports
    restart: always
    ports:
    - '9092'
    - '29092'
    environment:
    - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
    - CLUSTER_ID=oh-sxaDRTcyAr6pFRbXyzA
    - NODE_ID=1
    depends_on:
    - postgres
  openbao:
    image: openbao/openbao:2.5.4
    labels:
      io.quarkus.devservices.compose.wait_for.logs: .*OpenBao server started!.*
    restart: always
    ports:
    - '8200'
    environment:
    - BAO_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    - BAO_DEV_ROOT_TOKEN_ID=my-root-token
    command:
    - server
    - -dev
    - -dev-no-store-token
    healthcheck:
      test: [
        CMD,
        wget,
        --no-verbose,
        --tries=1,
        --spider,
        'http://127.0.0.0:8200'
      ]
      timeout: 5s
      start_period: 5s
      interval: 10s
      retries: 3
  openbao-init:
    image: openbao/openbao:2.5.4
    labels:
      io.quarkus.devservices.compose.wait_for.logs: .*Success! Uploaded policy.*
    restart: 'no'
    links:
    - openbao
    environment:
    - BAO_TOKEN=my-root-token
    - BAO_ADDR=http://openbao:8200
    entrypoint: [
      sh,
      -c,
      sleep 10;bao policy write pulse-app-policy /tmp/pulse-policy-policy.hcl;bao
        auth enable userpass;bao write auth/userpass/users/bob password=sinclair policies=pulse-app-policy
    ]
    volumes:
    - ./pulse-policy-policy.hcl:/tmp/pulse-policy-policy.hcl:ro,z
    depends_on:
    - openbao
