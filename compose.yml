services:
  postgres:
    image: postgres:17.6-alpine3.22
    container_name: postgres
    restart: always
    ports:
      - '5432'
    environment:
      - POSTGRES_USER=quarkus
      - POSTGRES_DB=quarkus
      - POSTGRES_PASSWORD=quarkus
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - hot_standby=on
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - synchronized_standby_slots=replication_slot
    healthcheck:
      start_period: 10s
      interval: 10s
      retries: 5
      test: [
        CMD,
        pg_isready
      ]
      timeout: 5s
    volumes:
      - ./cuisine/cuisine_production_sequences.sql:/docker-entrypoint-initdb.d/cuisine_production_sequences.sql:ro,z
      - ./cuisine/cuisine_production_sequences_table.sql:/docker-entrypoint-initdb.d/cuisine_production_sequences_table.sql:ro,z
      - ./cuisine/cuisine_production_aggregates.sql:/docker-entrypoint-initdb.d/cuisine_production_aggregates.sql:ro,z
      - ./cuisine/cuisine_production_idempotency_consumer.sql:/docker-entrypoint-initdb.d/cuisine_production_idempotency_consumer.sql:ro,z
      - ./gestion/salle_prisedecommande_target_consumer.sql:/docker-entrypoint-initdb.d/salle_prisedecommande_target_consumer.sql:ro,z
      - ./gestion/cuisine_production_target_consumer.sql:/docker-entrypoint-initdb.d/cuisine_production_target_consumer.sql:ro,z
      - ./gestion/gestion_statistics_idempotency_consumer.sql:/docker-entrypoint-initdb.d/gestion_statistics_idempotency_consumer.sql:ro,z
      - ./salle/salle_prisedecommande_sequences.sql:/docker-entrypoint-initdb.d/salle_prisedecommande_sequences.sql:ro,z
      - ./salle/salle_prisedecommande_sequences_table.sql:/docker-entrypoint-initdb.d/salle_prisedecommande_sequences_table.sql:ro,z
      - ./salle/salle_prisedecommande_aggregates.sql:/docker-entrypoint-initdb.d/salle_prisedecommande_aggregates.sql:ro,z
      - ./salle/salle_prisedecommande_idempotency_consumer.sql:/docker-entrypoint-initdb.d/salle_prisedecommande_idempotency_consumer.sql:ro,z
  # https://debezium.io/documentation/reference/stable/operations/monitoring.html
  # https://github.com/debezium/debezium-examples/tree/main/monitoring
  kafka:
    image: apache/kafka-native:4.2.0
    restart: always
    ports:
      - '9092'
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=1
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
# JMX seems not available for the Graalvm image version
#      - KAFKA_JMX_PORT=9997
    depends_on:
      - postgres
  # https://debezium.io/documentation/reference/stable/operations/monitoring.html
  # https://github.com/debezium/debezium-examples/tree/main/monitoring
  connect:
    image: quay.io/debezium/connect:3.3.1.Final
#    build:
#      context: debezium-jmx-exporter
#      args:
#        DEBEZIUM_VERSION: 3.3.1.Final
#        JMX_AGENT_VERSION: 1.0.1
    container_name: connect
    restart: always
    ports:
      - '8083'
      - '9012'
    links:
      - kafka
      - postgres
    environment:
      - LOG_LEVEL=WARN
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - GROUP_ID=1
      - STATUS_STORAGE_TOPIC=my_connect_statuses
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - BOOTSTRAP_SERVERS=kafka:9092
#      - KAFKA_OPTS=-javaagent:/kafka/etc/jmx_prometheus_javaagent.jar=7071:/kafka/etc/config.yml
#      - JMXHOST=0.0.0.0
#      - JMXPORT=9012
    healthcheck:
      start_period: 10s
      interval: 10s
      retries: 5
      test: [
        CMD,
        curl,
        -f,
        'http://localhost:8083/connectors'
      ]
      timeout: 5s
    depends_on:
      - postgres
      - kafka
  # https://github.com/kafbat/kafka-ui/blob/main/documentation/compose/kafbat-ui.yaml
  # https://github.com/kafbat/kafka-ui/blob/main/documentation/compose/ui-with-jmx-exporter.yaml
  kafbat-ui:
    container_name: kafbat-ui
    image: ghcr.io/kafbat/kafka-ui:aa21129
    ports:
      - '8084:8080'
    depends_on:
      - kafka
      - connect
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
#      - KAFKA_CLUSTERS_0_METRICS_PORT=9997
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME=debezium
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS=http://connect:8083
      - DYNAMIC_CONFIG_ENABLED=true
      - KAFKA_CLUSTERS_0_METRICS_STORE_PROMETHEUS_URL=http://otel-lgtm:9090
      - KAFKA_CLUSTERS_0_METRICS_STORE_PROMETHEUS_REMOTEWRITE=true
      - KAFKA_CLUSTERS_0_METRICS_STORE_KAFKA_TOPIC=kafka_metrics
    healthcheck:
      start_period: 12s
      interval: 1s
      retries: 5
      test: [
        CMD,
        wget,
        -q,
        --spider,
        'http://127.0.0.1:8080'
      ]
      timeout: 1s
  openbao:
    image: openbao/openbao:2.5.4
    labels:
      io.quarkus.devservices.compose.wait_for.logs: .*OpenBao server started!.*
    restart: always
    ports:
      - '8085:8200'
    environment:
      - BAO_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - BAO_DEV_ROOT_TOKEN_ID=my-root-token
    command:
      - server
      - -dev
      - -dev-no-store-token
    healthcheck:
      timeout: 5s
      start_period: 5s
      interval: 10s
      retries: 3
      test: [
        CMD,
        wget,
        --no-verbose,
        --tries=1,
        --spider,
        'http://127.0.0.0:8200'
      ]
  openbao-init:
    image: openbao/openbao:2.5.4
    labels:
      io.quarkus.devservices.compose.wait_for.logs: .*Success! Uploaded policy.*
    restart: 'no'
    links:
      - openbao
    environment:
      - BAO_TOKEN=my-root-token
      - BAO_ADDR=http://openbao:8200
    entrypoint: [
      sh,
      -c,
      sleep 10;bao policy write pulse-app-policy /tmp/pulse-policy-policy.hcl;bao
        auth enable userpass;bao write auth/userpass/users/bob password=sinclair policies=pulse-app-policy
    ]
    volumes:
      - ./cuisine/pulse-policy-policy.hcl:/tmp/pulse-policy-policy.hcl:ro,z
    depends_on:
      - openbao
  otel-lgtm:
    image: docker.io/grafana/otel-lgtm:0.11.0
    container_name: otel-lgtm
    ports:
      - '8086:3000'
    volumes:
      - ./otel-lgtm/debezium-dashboard.json:/otel-lgtm/debezium-dashboard.json:ro,z
      - ./otel-lgtm/grafana-dashboard-opentelemetry-logging.json:/otel-lgtm/grafana-dashboard-opentelemetry-logging.json:ro,z
      - ./otel-lgtm/grafana-dashboard-quarkus-micrometer-opentelemetry.json:/otel-lgtm/grafana-dashboard-quarkus-micrometer-opentelemetry.json:ro,z
      - ./otel-lgtm/grafana-dashboard-quarkus-micrometer-otlp.json:/otel-lgtm/grafana-dashboard-quarkus-micrometer-otlp.json:ro,z
      - ./otel-lgtm/grafana-dashboard-quarkus-micrometer-prometheus.json:/otel-lgtm/grafana-dashboard-quarkus-micrometer-prometheus.json:ro,z
      - ./otel-lgtm/loki-config.yaml:/otel-lgtm/loki-config.yaml:ro,z
      - ./otel-lgtm/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro,z
      - ./otel-lgtm/otelcol-config-export-http.yaml:/otel-lgtm/otelcol-config-export-http.yaml:ro,z
      - ./otel-lgtm/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro,z
      - ./otel-lgtm/pyroscope-config.yaml:/otel-lgtm/pyroscope-config.yaml:ro,z
      - ./otel-lgtm/tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro,z
      - ./otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml:ro,z
    healthcheck:
      start_period: 10s
      interval: 1s
      retries: 5
      test: [
        CMD,
        curl,
        -f,
        'http://localhost:3000'
      ]
      timeout: 1s
  alloy:
    image: grafana/alloy:v1.11.3
    container_name: alloy
    ports:
      - '12345:12345'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro,z
      - /run/podman/podman.sock:/run/podman/podman.sock:ro,z
      - /var/lib/docker/containers:/var/lib/docker/containers:ro,z
      - /var/lib/containers:/var/lib/containers:ro,z
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro,z
    command: run  --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - otel-lgtm
  salle-prise-de-commande:
    image: damien/salle-prise-de-commande:1.0.0-SNAPSHOT
    container_name: salle-prise-de-commande
    restart: always
    ports:
      - '8081:8080'
      - '9091:9090'
    links:
      - kafka
      - postgres
    depends_on:
      - kafka
      - postgres
      - connect
      - openbao
      - otel-lgtm
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/quarkus
      - QUARKUS_DATASOURCE_USERNAME=quarkus
      - QUARKUS_DATASOURCE_PASSWORD=quarkus
      # Attention le port n'est pas 29092
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PULSE_DEBEZIUM_CONNECT_HOST=connect
      - PULSE_DEBEZIUM_CONNECT_PORT=8083
      # vault authentication
      - QUARKUS_VAULT_URL=http://openbao:8200
      - QUARKUS_VAULT_AUTHENTICATION_USERPASS_USERNAME=bob
      - QUARKUS_VAULT_AUTHENTICATION_USERPASS_PASSWORD=sinclair
      - QUARKUS_MICROMETER_EXPORT_OTLP_URL=http://otel-lgtm:4318/v1/metrics
      - QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-lgtm:4318
      - QUARKUS_OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - QUARKUS_OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://otel-lgtm:4318
      - QUARKUS_OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://otel-lgtm:4318
      - QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://otel-lgtm:4318
      - OTEL_COLLECTOR_URL=otel-lgtm:4318
    healthcheck:
      start_period: 1s
      interval: 1s
      retries: 5
      test: [
        CMD,
        curl,
        -f,
        'http://localhost:8080/q/health'
      ]
      timeout: 1s
  cuisine-production:
    image: damien/cuisine-production:1.0.0-SNAPSHOT
    container_name: cuisine-production
    restart: always
    ports:
      - '8082:8080'
      - '9092:9090'
    links:
      - kafka
      - postgres
    depends_on:
      - kafka
      - postgres
      - connect
      - openbao
      - otel-lgtm
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/quarkus
      - QUARKUS_DATASOURCE_USERNAME=quarkus
      - QUARKUS_DATASOURCE_PASSWORD=quarkus
      # Attention le port n'est pas 29092
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PULSE_DEBEZIUM_CONNECT_HOST=connect
      - PULSE_DEBEZIUM_CONNECT_PORT=8083
      # vault authentication
      - QUARKUS_VAULT_URL=http://openbao:8200
      - QUARKUS_VAULT_AUTHENTICATION_USERPASS_USERNAME=bob
      - QUARKUS_VAULT_AUTHENTICATION_USERPASS_PASSWORD=sinclair
      - QUARKUS_MICROMETER_EXPORT_OTLP_URL=http://otel-lgtm:4318/v1/metrics
      - QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-lgtm:4318
      - QUARKUS_OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - QUARKUS_OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://otel-lgtm:4318
      - QUARKUS_OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://otel-lgtm:4318
      - QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://otel-lgtm:4318
      - OTEL_COLLECTOR_URL=otel-lgtm:4318
    healthcheck:
      start_period: 1s
      interval: 1s
      retries: 5
      test: [
        CMD,
        curl,
        -f,
        'http://localhost:8080/q/health'
      ]
      timeout: 1s
  gestion-statistics:
    image: damien/gestion-statistics:1.0.0-SNAPSHOT
    container_name: gestion-statistics
    restart: always
    ports:
      - '8083:8080'
      - '9093:9090'
    links:
      - kafka
      - postgres
    depends_on:
      - kafka
      - postgres
      - connect
      - openbao
      - otel-lgtm
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/quarkus
      - QUARKUS_DATASOURCE_USERNAME=quarkus
      - QUARKUS_DATASOURCE_PASSWORD=quarkus
      # Attention le port n'est pas 29092
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PULSE_DEBEZIUM_CONNECT_HOST=connect
      - PULSE_DEBEZIUM_CONNECT_PORT=8083
      # vault authentication
      - QUARKUS_VAULT_URL=http://openbao:8200
      - QUARKUS_VAULT_AUTHENTICATION_USERPASS_USERNAME=bob
      - QUARKUS_VAULT_AUTHENTICATION_USERPASS_PASSWORD=sinclair
      - QUARKUS_MICROMETER_EXPORT_OTLP_URL=http://otel-lgtm:4318/v1/metrics
      - QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-lgtm:4318
      - QUARKUS_OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - QUARKUS_OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://otel-lgtm:4318
      - QUARKUS_OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://otel-lgtm:4318
      - QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://otel-lgtm:4318
      - OTEL_COLLECTOR_URL=otel-lgtm:4318
      - QUARKUS_LOG_CATEGORY__IO_SMALLRYE_REACTIVE_MESSAGING__LEVEL=DEBUG
      - QUARKUS_LOG_CATEGORY__IO_QUARKUS_FLYWAY_RUNTIME__MIN_LEVEL=DEBUG
      - QUARKUS_LOG_CATEGORY__IO_QUARKUS_FLYWAY_RUNTIME__LEVEL=DEBUG
    healthcheck:
      start_period: 1s
      interval: 1s
      retries: 5
      test: [
        CMD,
        curl,
        -f,
        'http://localhost:8080/q/health'
      ]
      timeout: 1s
